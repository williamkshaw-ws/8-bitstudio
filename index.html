<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Bit Mini Golf</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="hole-info">Hole: 1/18</div>
            <div id="score-info">Strokes: 0</div>
            <div id="total-score">Total: 0</div>
        </div>
        <div id="title-screen">
            <h1 id="title-text" style="margin-bottom: 20px;">8-BIT<br>MINI GOLF</h1>
            
            <div style="display: flex; gap: 40px; justify-content: center; flex-wrap: wrap;">
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <p style="margin-bottom: 15px;">Local Play:</p>
                    <div class="player-buttons">
                        <button class="player-btn" data-players="1">1 Player</button>
                        <button class="player-btn" data-players="2">2 Players</button>
                        <button class="player-btn" data-players="3">3 Players</button>
                        <button class="player-btn" data-players="4">4 Players</button>
                    </div>
                </div>
                
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <p style="margin-bottom: 15px;">Online Multiplayer:</p>
                    <div class="player-buttons" id="online-buttons">
                        <button id="btn-host">Host Game</button>
                        <button id="btn-join-menu">Join Game</button>
                    </div>
                    <div id="host-ui" class="hidden" style="margin-top: 10px;">
                        <p style="color: #FFD700; font-size: 14px;">Room Code: <span id="room-code-display">...</span></p>
                        <p id="host-lobby-count" style="font-size: 10px;">Players in lobby: 1/4</p>
                        <button id="btn-start-multiplayer" style="margin-top: 10px; padding: 10px; font-size: 10px;">Start Game</button>
                    </div>
                    <div id="join-ui" class="hidden" style="margin-top: 10px;">
                        <div id="join-input-section">
                            <input type="text" id="join-code-input" placeholder="CODE" maxlength="4" style="text-transform:uppercase; font-family:'Press Start 2P', monospace; width: 100px; padding: 5px; text-align: center; display: block; margin: 0 auto 10px auto;">
                            <button id="btn-join" style="padding: 8px 10px; font-size: 12px;">Connect</button>
                        </div>
                        <p id="join-lobby-status" class="hidden" style="font-size: 10px; margin-top: 10px;">Waiting for host to start...</p>
                    </div>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="message-overlay" class="hidden">
            <h1 id="message-title">Level Complete!</h1>
            <p id="message-subtitle">Par: 3 | Strokes: 2</p>
            <div id="scorecard"></div>
            <button id="next-hole-btn">Next Hole</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
