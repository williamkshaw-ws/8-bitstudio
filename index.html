<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8-Bit Mini Golf</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="hole-info">Hole: 1/18</div>
            <div id="score-info">Strokes: 0</div>
            <div id="total-score">Total: 0</div>
        </div>
        <div id="title-screen">
            <h1 id="title-text">8-BIT<br>MINI GOLF</h1>
            <p>Local Play:</p>
            <div class="player-buttons">
                <button class="player-btn" data-players="1">1 Player</button>
                <button class="player-btn" data-players="2">2 Players</button>
                <button class="player-btn" data-players="3">3 Players</button>
                <button class="player-btn" data-players="4">4 Players</button>
            </div>
            <p style="margin-top: 20px;">Online Multiplayer:</p>
            <div class="player-buttons">
                <button id="btn-host">Host Game</button>
                <button id="btn-join-menu">Join Game</button>
            </div>
            <div id="host-ui" class="hidden" style="margin-top: 10px;">
                <p style="color: #FFD700; font-size: 14px;">Room Code: <span id="room-code-display">...</span></p>
                <p style="font-size: 10px;">Waiting for friend...</p>
            </div>
            <div id="join-ui" class="hidden" style="margin-top: 10px;">
                <input type="text" id="join-code-input" placeholder="CODE" maxlength="4" style="text-transform:uppercase; font-family:'Press Start 2P', monospace; width: 100px; padding: 5px; text-align: center;">
                <button id="btn-join" style="padding: 8px 10px; font-size: 12px; vertical-align: top;">Connect</button>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="message-overlay" class="hidden">
            <h1 id="message-title">Level Complete!</h1>
            <p id="message-subtitle">Par: 3 | Strokes: 2</p>
            <div id="scorecard"></div>
            <button id="next-hole-btn">Next Hole</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
